name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/free-supabase-auth

permissions:
  contents: write

jobs:
  materialize-auth:
    if: github.ref == 'refs/heads/feature/free-supabase-auth'
    name: Materialize Supabase auth foundation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: feature/free-supabase-auth
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Write auth files and patch app
        shell: bash
        run: |
          mkdir -p lib/supabase supabase/migrations
          cat > lib/supabase/client.ts <<'EOF'
          import { createClient, type SupabaseClient } from "@supabase/supabase-js";

          const supabaseUrl = process.env.NEXT_PUBLIC_SUPABASE_URL;
          const supabaseAnonKey = process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY;

          let browserClient: SupabaseClient | null = null;

          export const isSupabaseConfigured = Boolean(supabaseUrl && supabaseAnonKey);

          export function getSupabaseBrowserClient() {
            if (!isSupabaseConfigured) {
              return null;
            }

            if (!browserClient) {
              browserClient = createClient(supabaseUrl as string, supabaseAnonKey as string, {
                auth: {
                  persistSession: true,
                  autoRefreshToken: true,
                  detectSessionInUrl: true
                }
              });
            }

            return browserClient;
          }
          EOF

          cat > .env.example <<'EOF'
          NEXT_PUBLIC_SUPABASE_URL=
          NEXT_PUBLIC_SUPABASE_ANON_KEY=
          EOF

          cat > supabase/migrations/202605230001_create_profiles.sql <<'EOF'
          create table if not exists public.profiles (
            id uuid primary key references auth.users(id) on delete cascade,
            full_name text,
            email text,
            role text not null default 'advisor' check (role in ('admin', 'advisor', 'portfolio_owner', 'viewer')),
            phone text,
            company text,
            avatar_url text,
            created_at timestamptz not null default now(),
            updated_at timestamptz not null default now()
          );

          alter table public.profiles enable row level security;

          create policy "profiles_select_own" on public.profiles for select to authenticated using (auth.uid() = id);
          create policy "profiles_insert_own" on public.profiles for insert to authenticated with check (auth.uid() = id);
          create policy "profiles_update_own" on public.profiles for update to authenticated using (auth.uid() = id) with check (auth.uid() = id);

          create or replace function public.set_updated_at()
          returns trigger
          language plpgsql
          security definer
          set search_path = public
          as $$
          begin
            new.updated_at = now();
            return new;
          end;
          $$;

          drop trigger if exists profiles_set_updated_at on public.profiles;
          create trigger profiles_set_updated_at before update on public.profiles for each row execute function public.set_updated_at();

          create or replace function public.handle_new_user()
          returns trigger
          language plpgsql
          security definer
          set search_path = public
          as $$
          begin
            insert into public.profiles (id, full_name, email)
            values (new.id, coalesce(new.raw_user_meta_data->>'full_name', new.raw_user_meta_data->>'name'), new.email)
            on conflict (id) do update
              set email = excluded.email,
                  full_name = coalesce(public.profiles.full_name, excluded.full_name),
                  updated_at = now();
            return new;
          end;
          $$;

          drop trigger if exists on_auth_user_created on auth.users;
          create trigger on_auth_user_created after insert on auth.users for each row execute function public.handle_new_user();
          EOF

