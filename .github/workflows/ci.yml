            <button type="button" onClick={submit} disabled={loading || !isConfigured} className="w-full rounded-xl bg-slate-950 px-4 py-3 text-sm font-medium text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-50">{loading ? "Kontrol ediliyor..." : mode === "signup" ? "Hesap Oluştur" : "Giriş Yap"}</button>
            <button type="button" onClick={continueWithGoogle} disabled={loading || !isConfigured} className="flex w-full items-center justify-center gap-2 rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-800 transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"><span className="flex h-5 w-5 items-center justify-center rounded-full border border-slate-200 text-xs font-semibold">G</span>Continue with Google</button>
