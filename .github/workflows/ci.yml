          cat >> README.md <<'EOF'

          ## Free-Tier Supabase Auth Setup

          Ocean uses a free-tier-friendly foundation: Vercel free tier for hosting and Supabase free tier for Auth, Postgres, and advisor profile records. No paid auth, CRM, analytics, realtime, storage, or background job services are included in this stage.

          ### Environment Variables

          Create `.env.local` locally and add the same variables in Vercel Project Settings:

          ```bash
          NEXT_PUBLIC_SUPABASE_URL=your-project-url
          NEXT_PUBLIC_SUPABASE_ANON_KEY=your-anon-key
          ```

          `.env.example` contains placeholders only. Do not commit real secrets.

          ### Database Migration

          Apply `supabase/migrations/202605230001_create_profiles.sql`. It creates the `profiles` table, enables RLS, allows authenticated users to read/insert/update only their own profile, and creates a trigger for new Supabase Auth users.

          ### Google OAuth

          In Supabase Dashboard, go to Authentication → Providers → Google, add the Google Client ID and Secret, then add local and production redirect URLs such as:

          ```text
          http://localhost:3000
          http://127.0.0.1:3030
          https://your-vercel-domain.vercel.app
          ```

          Also add the matching Supabase callback URL in Google Cloud Console.

          ### Intentionally Not Included Yet

          - portfolio database
          - matching engine database
          - CRM database
          - admin panel
          - realtime subscriptions
          - paid services
          EOF

