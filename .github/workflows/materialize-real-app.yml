name: Materialize real existing Ocean app

on:
  push:
    branches:
      - feature/import-real-existing-app
    paths:
      - ".github/workflows/materialize-real-app.yml"
      - ".github/materialize/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout import branch
        uses: actions/checkout@v4
        with:
          ref: feature/import-real-existing-app

      - name: Reconstruct real app files
        run: |
          set -euo pipefail
          mkdir -p app/api/sahibinden-import public/contracts public

          base64 -d .github/materialize/page.tsx.gz.b64 | gunzip > app/page.tsx
          base64 -d .github/materialize/globals.css.gz.b64 | gunzip > app/globals.css
          base64 -d .github/materialize/sahibinden-route.ts.gz.b64 | gunzip > app/api/sahibinden-import/route.ts

          base64 -d .github/materialize/danisman-sozlesmesi.pdf.b64 > public/contracts/danisman-sozlesmesi.pdf
          base64 -d .github/materialize/kat-karsiligi.pdf.b64 > public/contracts/kat-karsiligi.pdf
          base64 -d .github/materialize/oda-proje-gelistirme.pdf.b64 > public/contracts/oda-proje-gelistirme.pdf
          base64 -d .github/materialize/satisa-aracilik.pdf.b64 > public/contracts/satisa-aracilik.pdf

          curl -fsSL 'https://you-are-refactoring-and-stabilizing.vercel.app/mandarin-2.jpeg?_vercel_share=ToBxjbRyTXaZNI8kvB6gdpkVAsmeLTwr' -o public/mandarin-2.jpeg

      - name: Verify reconstructed checksums
        run: |
          set -euo pipefail
          cat > /tmp/ocean-sha256.txt <<'EOF'
          0e8e0b561af817ca62e2c015a13bc12e3d0adfe059b8da704803a1b223b2330b  app/page.tsx
          d0d980c905f374eff54ecd7e4514873c18286adf2e8269b75cb8b8cc7c92f4a0  app/globals.css
          9ed4535f28ccb66c051e2300780ad7eced0c01fdabcd074fc4d42bf900e7301a  app/api/sahibinden-import/route.ts
          ed4b4203cf4f73d79276e7d7bc8a9301eba047a6685db9031ca29406c0acf221  public/mandarin-2.jpeg
          f91eecff3f3f8fbfb37aec9adbbd4173bf0de480ec55eba5c8a67b75f88ac853  public/contracts/danisman-sozlesmesi.pdf
          e15d88f9279b7ba126d8b5ecf14c8ab6b03883805ecadfebdc7eda45819c343e  public/contracts/kat-karsiligi.pdf
          2f73090a6e9ddc26ef182ab53fd40096d459dfcfe9e2cc26bb4a815ee209b739  public/contracts/oda-proje-gelistirme.pdf
          1967ec98f55948321b291ebcd629227413b1a3a2e05948fb631d56ad1e188c50  public/contracts/satisa-aracilik.pdf
          EOF
          sha256sum -c /tmp/ocean-sha256.txt
          test "$(wc -l < app/page.tsx | tr -d ' ')" = "3206"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Commit materialized files
        run: |
          set -euo pipefail
          rm -rf .github/materialize .github/workflows/materialize-real-app.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitignore package.json tsconfig.json next.config.mjs postcss.config.js tailwind.config.js next-env.d.ts app public
          git add -u .github || true
          git status --short
          git commit -m "Import real existing Ocean app" || exit 0
          git push origin HEAD:feature/import-real-existing-app
