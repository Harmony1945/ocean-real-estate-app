            .btn-secondary { @apply inline-flex min-h-11 items-center justify-center rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:border-slate-300 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:border-slate-600 dark:hover:bg-slate-800; }
            .btn-danger { @apply inline-flex min-h-11 items-center justify-center rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-500 transition hover:border-slate-300 hover:text-slate-950 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-400 dark:hover:border-slate-600 dark:hover:text-slate-100; }
            .mini-action { @apply inline-flex min-h-8 items-center justify-center rounded-full border border-slate-200 bg-white px-2.5 py-1 text-xs font-medium text-slate-600 transition hover:border-slate-300 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:hover:border-slate-600 dark:hover:bg-slate-800; }
            .liquid-glass-card { @apply border border-white/70 bg-white/80 shadow-[0_18px_45px_rgba(15,23,42,0.08)] backdrop-blur-xl dark:border-white/10 dark:bg-slate-950/60 dark:shadow-[0_18px_45px_rgba(0,0,0,0.32)]; }
          }
          @layer utilities {
            .dark .bg-stone-50 { background-color: #020617; }
            .dark .bg-white { background-color: #0f172a; }
            .dark .bg-white\/90 { background-color: rgb(15 23 42 / 0.9); }
            .dark .bg-white\/95 { background-color: rgb(15 23 42 / 0.95); }
            .dark .bg-slate-50 { background-color: #111827; }
            .dark .bg-slate-100 { background-color: #1e293b; }
            .dark .bg-slate-200 { background-color: #334155; }
            .dark .bg-slate-950 { background-color: #e2e8f0; }
            .dark .text-slate-950 { color: #f8fafc; }
            .dark .text-slate-900, .dark .text-slate-800 { color: #e2e8f0; }
            .dark .text-slate-700, .dark .text-slate-600 { color: #cbd5e1; }
            .dark .text-slate-500, .dark .text-slate-400 { color: #94a3b8; }
            .dark .text-white { color: #020617; }
            .dark .border-slate-100, .dark .border-slate-200 { border-color: #1e293b; }
            .dark .border-slate-300 { border-color: #334155; }
            .dark .border-white\/60 { border-color: rgb(255 255 255 / 0.14); }
            .dark .bg-emerald-50 { background-color: rgb(6 78 59 / 0.32); }
            .dark .text-emerald-700 { color: #6ee7b7; }
            .dark .border-emerald-100, .dark .border-emerald-200 { border-color: rgb(16 185 129 / 0.28); }
            .dark .bg-red-50 { background-color: rgb(127 29 29 / 0.28); }
            .dark .text-red-500, .dark .text-red-600, .dark .text-red-700 { color: #fca5a5; }
            .dark .border-red-200, .dark .border-red-300 { border-color: rgb(248 113 113 / 0.32); }
            .dark .bg-indigo-50 { background-color: rgb(49 46 129 / 0.32); }
            .dark .shadow-sm, .dark .shadow-xl { box-shadow: 0 20px 50px rgb(0 0 0 / 0.28); }
          }
          EOF

          cat > app/layout.tsx <<'EOF'
          import type { Metadata } from "next";
          import Script from "next/script";
          import "./globals.css";

          export const metadata: Metadata = { title: "OCEAN BrokerageOS", description: "Gayrimenkul aracılık ekipleri için odaklı işletim sistemi." };
          const themeScript = `(() => { try { const savedTheme = window.localStorage.getItem("ocean-theme"); const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches; const theme = savedTheme === "dark" || savedTheme === "light" ? savedTheme : systemPrefersDark ? "dark" : "light"; document.documentElement.classList.toggle("dark", theme === "dark"); document.documentElement.style.colorScheme = theme; } catch { document.documentElement.style.colorScheme = "light"; } })();`;
          export default function RootLayout({ children }: Readonly<{ children: React.ReactNode }>) { return <html lang="tr" suppressHydrationWarning><head><Script id="ocean-theme-script" strategy="beforeInteractive" dangerouslySetInnerHTML={{ __html: themeScript }} /></head><body>{children}</body></html>; }
          EOF

          cat > tailwind.config.js <<'EOF'
          /** @type {import('tailwindcss').Config} */
          module.exports = { darkMode: "class", content: ["./app/**/*.{js,ts,jsx,tsx,mdx}", "./components/**/*.{js,ts,jsx,tsx,mdx}", "./lib/**/*.{js,ts,jsx,tsx,mdx}"], theme: { extend: { colors: { ocean: { 50: "#eff9ff", 100: "#dff2ff", 500: "#177daa", 600: "#116a91", 900: "#102f42" }, ink: { 50: "#f7f8f8", 100: "#ecf0f1", 300: "#c5cfd3", 600: "#52636c", 800: "#25323a", 950: "#0d171d" }, coral: { 100: "#ffe3dc", 500: "#e7664f" }, gold: { 100: "#f7ead0", 500: "#b88933" }, sage: { 100: "#dfeee7", 500: "#478365" } }, boxShadow: { panel: "0 18px 50px rgba(13, 23, 29, 0.08)" } } }, plugins: [] };
          EOF

          npm install @supabase/supabase-js --package-lock-only --lockfile-version=3
          git checkout origin/main -- .github/workflows/ci.yml

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Build
        run: npm run build

      - name: Commit materialized auth foundation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/page.tsx app/globals.css app/layout.tsx tailwind.config.js package.json package-lock.json README.md .env.example lib/supabase/client.ts supabase/migrations/202605230001_create_profiles.sql .github/workflows/ci.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add free Supabase advisor auth"
          git push

  validate:
    if: github.ref != 'refs/heads/feature/free-supabase-auth'
    name: Validate app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run check
      - name: Build
        run: npm run build
