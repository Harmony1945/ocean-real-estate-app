          </div>
          <div className="mb-4 grid grid-cols-2 rounded-2xl bg-slate-100 p-1">
            <button type="button" onClick={() => changeMode("login")} className={`rounded-xl px-3 py-2 text-sm transition ${mode === "login" ? "bg-white text-slate-950 shadow-sm" : "text-slate-500 hover:text-slate-800"}`}>Login</button>
            <button type="button" onClick={() => changeMode("signup")} className={`rounded-xl px-3 py-2 text-sm transition ${mode === "signup" ? "bg-white text-slate-950 shadow-sm" : "text-slate-500 hover:text-slate-800"}`}>Signup</button>
          </div>
          <div className="space-y-3">
            {mode === "signup" ? <input className="input !rounded-xl !px-4 !py-3" placeholder="Ad Soyad" value={form.name} onChange={(event) => update("name", event.target.value)} onKeyDown={(event) => { if (event.key === "Enter") submit(); }} /> : null}
            <input className="input !rounded-xl !px-4 !py-3" placeholder="Kullanıcı adı veya e-posta" value={form.email} onChange={(event) => update("email", event.target.value)} onKeyDown={(event) => { if (event.key === "Enter") submit(); }} />
            <input className="input !rounded-xl !px-4 !py-3" placeholder="Şifre" type="password" value={form.password} onChange={(event) => update("password", event.target.value)} onKeyDown={(event) => { if (event.key === "Enter") submit(); }} />
            {!isConfigured ? <p className="rounded-2xl border border-slate-200 bg-white/80 px-3 py-2 text-sm leading-6 text-slate-600">Supabase kurulumu bekleniyor. `NEXT_PUBLIC_SUPABASE_URL` ve `NEXT_PUBLIC_SUPABASE_ANON_KEY` eklenince gerçek giriş aktif olur.</p> : null}
