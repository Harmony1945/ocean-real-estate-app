          auth_funcs = '''
  async function ensureProfile(user: User, fullName?: string) {
    if (!supabase) return;

    await supabase.from("profiles").upsert({
      id: user.id,
      full_name: fullName || getAuthDisplayName(user),
      email: user.email,
      role: "advisor"
    });
  }

  function getAuthMessage(message?: string) {
    if (!message) return "İşlem tamamlanamadı. Lütfen tekrar deneyin.";
    if (message.includes("Invalid login credentials")) return "E-posta veya şifre hatalı.";
    if (message.includes("Email not confirmed")) return "E-posta adresinizi doğrulamanız gerekiyor.";
    if (message.includes("User already registered")) return "Bu e-posta adresiyle daha önce hesap oluşturulmuş.";
    if (message.includes("Password should be")) return "Şifre Supabase güvenlik koşullarını karşılamıyor.";
    return message;
  }

  async function handleAuthSubmit() {
    if (!supabase) {
      setAuthError("Supabase bağlantısı eksik. Lütfen ortam değişkenlerini ayarlayın.");
      return;
    }

    setAuthLoading(true);
    setAuthError("");
    setAuthNotice("");

    if (authMode === "signup") {
      const { data, error } = await supabase.auth.signUp({
        email: authForm.email.trim(),
        password: authForm.password,
        options: {
          data: { full_name: authForm.name.trim() },
          emailRedirectTo: typeof window !== "undefined" ? window.location.origin : undefined
        }
      });

      if (error) {
        setAuthError(getAuthMessage(error.message));
        setAuthLoading(false);
        return;
      }

      if (data.user) await ensureProfile(data.user, authForm.name.trim());
      if (!data.session) setAuthNotice("Hesap oluşturuldu. Supabase e-posta doğrulaması açıksa gelen kutunuzu kontrol edin.");
      setAuthLoading(false);
      return;
    }

    const { error } = await supabase.auth.signInWithPassword({
      email: authForm.email.trim(),
      password: authForm.password
    });

    if (error) {
      setAuthError(getAuthMessage(error.message));
      setAuthLoading(false);
      return;
    }

    setAuthLoading(false);
  }

  async function handleGoogleLogin() {
    if (!supabase) {
      setAuthError("Supabase bağlantısı eksik. Lütfen ortam değişkenlerini ayarlayın.");
      return;
    }

    setAuthLoading(true);
    setAuthError("");
    setAuthNotice("");

    const { error } = await supabase.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: window.location.origin }
    });

    if (error) {
      setAuthError(getAuthMessage(error.message));
      setAuthLoading(false);
    }
  }

  async function handleLogout() {
    if (supabase) await supabase.auth.signOut();
    setAuthUser(null);
    setIsAuthenticated(false);
  }

